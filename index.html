<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta name="google-site-verification" content="f33NIAM_xl3_oZbolnyAiMU4f-2H59NXUozPAQDiXvU" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpskillLanka - Sri Lanka's Career Pathway Guide</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Config for custom theme colors & fonts -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              display: ['"Stack Sans Headline"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
              body: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <style>
      /* Integrated Color Themes */
      :root {
        --bg:       #07080f;
        --surf:     #0f1018;
        --surf2:    #181921;
        --border:   rgba(255,255,255,0.08);
        --green:    #00e5a0;
        --purple:   #a855f7;
        --amber:    #fbbf24;
        --blue:     #60a5fa;
        --text:     #eeeef5;
        --muted:    #696980;
        --header-bg: rgba(7,8,15,.88);
      }

      :root.light {
        --bg:       #f0f2f8;
        --surf:     #ffffff;
        --surf2:    #e8eaf2;
        --border:   rgba(0,0,0,0.09);
        --green:    #00a371;
        --purple:   #8b35e8;
        --amber:    #d4920a;
        --blue:     #2a80e8;
        --text:     #0e0f1a;
        --muted:    #7a7a9a;
        --header-bg: rgba(240,242,248,.92);
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        transition: background .3s ease, color .3s ease;
      }

      /* Ambient Radial Orbs */
      body::before, body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
      }
      body::before {
        top: -25%; left: -15%;
        width: 65vmax; height: 65vmax;
        background: radial-gradient(circle, rgba(168,85,247,.07) 0%, transparent 65%);
      }
      body::after {
        bottom: -20%; right: -10%;
        width: 50vmax; height: 50vmax;
        background: radial-gradient(circle, rgba(0,229,160,.06) 0%, transparent 65%);
      }
      :root.light body::before { background: radial-gradient(circle, rgba(139,53,232,.05) 0%, transparent 65%); }
      :root.light body::after  { background: radial-gradient(circle, rgba(0,163,113,.05) 0%, transparent 65%); }

      /* Wave Parallax & Floating Shapes Section */
      .home-bg-animation {
        position: absolute;
        inset: 0;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
        opacity: 0.8;
        user-select: none;
      }
      .wave-layer {
        position: absolute;
        inset: 0;
        transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        will-change: transform;
      }
      .ambient-orb {
        position: absolute;
        border-radius: 50%;
        mix-blend-mode: screen;
        pointer-events: none;
        filter: blur(120px);
        -webkit-filter: blur(120px);
      }
      :root.light .ambient-orb {
        mix-blend-mode: multiply;
        opacity: 0.55;
      }

      @keyframes waveSwaySlow {
        0% { transform: translate3d(0, 0, 0) rotate(0deg); }
        50% { transform: translate3d(2%, -1%, 0) rotate(0.5deg); }
        100% { transform: translate3d(0, 0, 0) rotate(0deg); }
      }
      @keyframes waveSwayMedium {
        0% { transform: translate3d(0, 0, 0) rotate(0deg); }
        50% { transform: translate3d(-3%, 2%, 0) rotate(-1deg); }
        100% { transform: translate3d(0, 0, 0) rotate(0deg); }
      }
      @keyframes waveSwayFast {
        0% { transform: translate3d(0, 0, 0) rotate(0deg); }
        50% { transform: translate3d(2.5%, -2%, 0) rotate(1.2deg); }
        100% { transform: translate3d(0, 0, 0) rotate(0deg); }
      }
      @keyframes waveSwayExtra {
        0% { transform: translate3d(0, 0, 0) rotate(0deg); }
        50% { transform: translate3d(-1.5%, 1.5%, 0) rotate(-0.5deg); }
        100% { transform: translate3d(0, 0, 0) rotate(0deg); }
      }
      @keyframes drift-slow {
        0% { transform: translate(0, 0) scale(1) rotate(0deg); }
        50% { transform: translate(12%, -8%) scale(1.15) rotate(120deg); }
        100% { transform: translate(-8%, 15%) scale(0.9) rotate(360deg); }
      }
      @keyframes drift-medium {
        0% { transform: translate(0, 0) scale(1) rotate(0deg); }
        50% { transform: translate(-15%, 12%) scale(1.25) rotate(-180deg); }
        100% { transform: translate(8%, -10%) scale(0.85) rotate(-360deg); }
      }
      .animate-wave-slow { animation: waveSwaySlow 28s infinite alternate ease-in-out; }
      .animate-wave-medium { animation: waveSwayMedium 22s infinite alternate-reverse ease-in-out; }
      .animate-wave-fast { animation: waveSwayFast 18s infinite alternate ease-in-out; }
      .animate-wave-extra { animation: waveSwayExtra 32s infinite alternate-reverse ease-in-out; }

      /* UI Styles */
      .theme-toggle {
        width: 44px; height: 24px;
        background: var(--surf2);
        border: 1px solid var(--border);
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
        transition: background .3s ease, border-color .3s ease;
        padding: 0;
        outline: none;
      }
      .theme-toggle-thumb {
        position: absolute;
        top: 3px; left: 3px;
        width: 16px; height: 16px;
        border-radius: 50%;
        background: var(--muted);
        transition: transform .3s cubic-bezier(.4,0,.2,1), background .3s ease;
        display: flex; align-items: center; justify-content: center;
        font-size: 9px; line-height: 1;
      }
      :root.light .theme-toggle-thumb { transform: translateX(20px); background: var(--amber); }
      :root:not(.light) .theme-toggle-thumb { transform: translateX(0); background: #5b5b80; }

      header {
        position: sticky; top: 0; z-index: 200;
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 24px;
        background: var(--header-bg);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--border);
      }

      .logo {
        display: flex; align-items: center; gap: 10px;
        font-family: "Stack Sans Headline", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 500; font-size: 21px; letter-spacing: -0.3px;
        color: var(--text);
        text-decoration: none;
        cursor: pointer;
        user-select: none;
        transition: color .3s ease;
      }
      .logo-container {
        width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
        background: var(--surf2);
        border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        transition: all .3s ease;
      }
      .logo:hover .logo-container { transform: scale(1.05); border-color: var(--green); }

      .btn {
        padding: 8px 16px; border-radius: 8px; border: none;
        font-size: 13px; font-weight: 600;
        cursor: pointer; transition: all .2s ease; white-space: nowrap;
      }
      .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
      .btn-outline:hover { border-color: rgba(255,255,255,.2); color: var(--text); }
      :root.light .btn-outline:hover { border-color: rgba(0,0,0,.15); }
      .btn-solid { background: linear-gradient(135deg, var(--green), #00c880); color: #000; font-weight: 700; }
      .btn-solid:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(0,229,160,.28); }

      .pill {
        display: inline-flex; align-items: center; gap: 6px;
        background: rgba(168,85,247,.13);
        border: 1px solid rgba(168,85,247,.28);
        color: #c084fc;
        padding: 5px 14px; border-radius: 50px;
        font-size: 12px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase;
        margin-bottom: 26px;
        animation: up .6s ease both;
      }
      :root.light .pill { background: rgba(139,53,232,.1); border-color: rgba(139,53,232,.22); color: var(--purple); }

      .hero-h1 {
        font-family: "Stack Sans Headline", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: clamp(34px, 7vw, 66px);
        font-weight: 500; line-height: 1.15; letter-spacing: -0.8px;
        max-width: 720px; margin-bottom: 18px;
        animation: up .6s .08s ease both;
        position: relative;
      }
      .hero-h1 .grad {
        background: linear-gradient(120deg, var(--green) 0%, var(--purple) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero-sub {
        color: var(--muted);
        font-size: 16px;
        max-width: 480px;
        line-height: 1.65;
        margin-bottom: 44px;
        animation: up .6s .16s ease both;
        min-height: 2.8em;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .typewriter-wrap { display: inline; position: relative; }
      .typewriter-cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background: var(--green);
        border-radius: 2px;
        margin-left: 2px;
        vertical-align: middle;
        animation: blink 1s step-end infinite;
        position: relative;
        top: -1px;
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

      .home-cards {
        display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
        animation: up .6s .24s ease both;
        position: relative;
      }

      .home-card {
        width: 230px; padding: 26px 22px;
        background: var(--surf); border: 1px solid var(--border);
        border-radius: 20px; cursor: pointer;
        transition: transform .28s ease, box-shadow .28s ease, border-color .28s ease;
        text-align: left; position: relative; overflow: hidden;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .home-card::after {
        content: ''; position: absolute; inset: 0; border-radius: 20px;
        opacity: 0; transition: opacity .28s ease;
      }
      .home-card.g::after { background: radial-gradient(circle at 0% 0%, rgba(0,229,160,.1), transparent 55%); }
      .home-card.p::after { background: radial-gradient(circle at 0% 0%, rgba(168,85,247,.1), transparent 55%); }
      .home-card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,.13); }
      .home-card:hover::after { opacity: 1; }
      .home-card.g:hover { box-shadow: 0 20px 44px rgba(0,229,160,.12); }
      .home-card.p:hover { box-shadow: 0 20px 44px rgba(168,85,247,.12); }

      .hc-icon {
        width: 46px; height: 46px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; margin-bottom: 14px; position: relative; z-index: 1;
      }
      .hc-icon.g { background: rgba(0,229,160,.13); }
      .hc-icon.p { background: rgba(168,85,247,.13); }

      .home-card h3 { font-family: "Stack Sans Headline", sans-serif; font-size: 19px; font-weight: 500; margin-bottom: 6px; position: relative; z-index: 1; }
      .home-card p  { color: var(--muted); font-size: 13px; line-height: 1.5; margin-bottom: 18px; position: relative; z-index: 1; }
      .hc-cta { font-size: 13px; font-weight: 700; position: relative; z-index: 1; }
      .home-card.g .hc-cta { color: var(--green); }
      .home-card.p .hc-cta { color: var(--purple); }

      .sub-nav { display: flex; align-items: center; gap: 6px; padding: 20px 24px 0; max-width: 1120px; margin: 0 auto; }
      .back-btn {
        display: inline-flex; align-items: center; gap: 5px;
        background: none; border: none;
        color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer;
        transition: color .2s;
      }
      .back-btn:hover { color: var(--text); }
      .crumb { color: var(--muted); font-size: 13px; }
      .crumb b { color: var(--text); font-weight: 600; }

      .ph { padding: 28px 24px 20px; max-width: 1120px; margin: 0 auto; }
      .ph h2 { font-family: "Stack Sans Headline", sans-serif; font-size: clamp(26px, 4.5vw, 40px); font-weight: 500; letter-spacing: -0.3px; margin-bottom: 5px; }
      .ph p  { color: var(--muted); font-size: 14px; }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px;
        padding: 4px 24px 52px;
        max-width: 1120px; margin: 0 auto;
      }

      .cc {
        background: var(--surf); border: 1px solid var(--border);
        border-radius: 16px; padding: 22px;
        cursor: pointer;
        transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
        animation: up .45s ease both;
      }
      .cc:hover { transform: translateY(-4px); border-color: rgba(255,255,255,.13); box-shadow: 0 16px 36px rgba(0,0,0,.35); }
      .cc-emoji { font-size: 30px; margin-bottom: 12px; line-height: 1; }
      .cc h3 { font-family: "Stack Sans Headline", sans-serif; font-size: 16px; font-weight: 500; margin-bottom: 5px; }
      .cc p  { color: var(--muted); font-size: 13px; line-height: 1.5; }
      .cc-foot { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
      
      .tag { font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 3px 9px; border-radius: 50px; }
      .tg { background: rgba(0,229,160,.11); color: var(--green); }
      .tp { background: rgba(168,85,247,.11); color: #c084fc; }
      .ta { background: rgba(251,191,36,.11); color: var(--amber); }
      .tb { background: rgba(96,165,250,.11); color: var(--blue); }

      .arr {
        width: 26px; height: 26px; border-radius: 7px;
        background: var(--surf2);
        display: flex; align-items: center; justify-content: center;
        color: var(--muted); font-size: 13px;
        transition: all .2s;
      }
      .cc:hover .arr { background: rgba(255,255,255,.1); color: var(--text); transform: translate(2px,-2px); }

      #detailBox {
        background: var(--surf); border: 1px solid var(--border);
        border-radius: 20px; padding: 36px;
        margin: 16px 24px 0;
        max-width: 820px;
        animation: up .4s ease;
      }
      .di-emoji { font-size: 44px; margin-bottom: 18px; line-height: 1; }
      #detailBox h2 { font-family: "Stack Sans Headline", sans-serif; font-size: clamp(22px, 4vw, 32px); font-weight: 500; letter-spacing: -0.3px; margin-bottom: 6px; }
      .di-desc { color: var(--muted); font-size: 14px; margin-bottom: 26px; }
      .di-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .di-block { background: var(--surf2); border-radius: 14px; padding: 18px; }
      .di-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
      .di-val { font-size: 14px; line-height: 1.65; color: var(--text); }

      #dashboard { padding: 36px 24px 52px; max-width: 920px; margin: 0 auto; }
      #dashboard > h2 { font-family: "Stack Sans Headline", sans-serif; font-size: clamp(24px, 4vw, 34px); font-weight: 500; margin-bottom: 22px; }
      .profile-card {
        background: var(--surf); border: 1px solid var(--border);
        border-radius: 18px; padding: 24px;
        display: flex; align-items: center; gap: 16px;
        margin-bottom: 20px;
      }
      .avatar {
        width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
        background: linear-gradient(135deg, var(--green), var(--purple));
        display: flex; align-items: center; justify-content: center;
        font-family: "Stack Sans Headline", sans-serif; font-weight: 500; font-size: 20px; color: #000;
      }
      .pi h3 { font-family: "Stack Sans Headline", sans-serif; font-size: 18px; font-weight: 500; }
      .pi p  { color: var(--muted); font-size: 13px; margin-top: 2px; }

      .ex-row { display: flex; gap: 12px; flex-wrap: wrap; }
      .ex-btn {
        flex: 1; min-width: 180px;
        background: var(--surf); border: 1px solid var(--border);
        border-radius: 14px; padding: 18px 20px;
        display: flex; justify-content: space-between; align-items: center;
        cursor: pointer; transition: all .25s ease;
      }
      .ex-btn span:first-child { font-family: "Stack Sans Headline", sans-serif; font-weight: 500; font-size: 15px; }
      .ex-btn.g:hover { border-color: rgba(0,229,160,.3); box-shadow: 0 10px 24px rgba(0,229,160,.09); transform: translateY(-3px); }
      .ex-btn.p:hover { border-color: rgba(168,85,247,.3); box-shadow: 0 10px 24px rgba(168,85,247,.09); transform: translateY(-3px); }

      .login-card {
        background: var(--surf); border: 1px solid var(--border);
        border-radius: 22px; padding: 36px 32px;
        width: 100%; max-width: 370px;
        animation: up .45s ease;
      }
      .login-card h2 { font-family: "Stack Sans Headline", sans-serif; font-size: 26px; font-weight: 500; margin-bottom: 4px; }
      .login-card .sub { color: var(--muted); font-size: 14px; margin-bottom: 26px; }
      .igrp { margin-bottom: 14px; }
      .igrp label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: .3px; }
      .igrp input {
        width: 100%; background: var(--surf2);
        border: 1px solid var(--border);
        border-radius: 10px; padding: 11px 14px;
        color: var(--text); font-size: 14px;
        outline: none; transition: border-color .2s;
        -webkit-appearance: none;
      }
      .igrp input:focus { border-color: rgba(0,229,160,.45); }
      .igrp input::placeholder { color: var(--muted); }
      .login-btn {
        width: 100%; margin-top: 6px; padding: 13px;
        background: linear-gradient(135deg, var(--green), #00c880);
        color: #000; border: none; border-radius: 10px;
        font-family: "Stack Sans Headline", sans-serif; font-weight: 500; font-size: 15px;
        cursor: pointer; transition: all .2s ease;
      }
      .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(0,229,160,.28); }

      @keyframes up {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .cat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
        padding: 4px 24px 52px;
        max-width: 1120px;
        margin: 0 auto;
      }

      .cat-btn {
        background: var(--surf); border: 1px solid var(--border); border-radius: 16px;
        padding: 24px 20px; cursor: pointer; text-align: left;
        transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
        animation: up .45s ease both;
        display: flex; flex-direction: column; gap: 10px;
      }
      .cat-btn:hover { transform: translateY(-4px); border-color: rgba(255,255,255,.13); box-shadow: 0 16px 36px rgba(0,0,0,.35); }
      .cat-btn-icon  { font-size: 28px; line-height: 1; }
      .cat-btn-title { font-family: "Stack Sans Headline", sans-serif; font-size: 15px; color: var(--text); }
      .cat-btn-sub   { font-size: 12px; color: var(--muted); line-height: 1.4; }

      .cat-btn.af:hover   { border-color: rgba(0,229,160,.3);   box-shadow: 0 16px 36px rgba(0,229,160,.1); }
      .cat-btn.biz:hover  { border-color: rgba(168,85,247,.3);  box-shadow: 0 16px 36px rgba(168,85,247,.1); }
      .cat-btn.itc:hover  { border-color: rgba(96,165,250,.3);  box-shadow: 0 16px 36px rgba(96,165,250,.1); }
      .cat-btn.bank:hover { border-color: rgba(251,191,36,.3);  box-shadow: 0 16px 36px rgba(251,191,36,.1); }

      .ql-page { padding: 0 24px 52px; max-width: 900px; margin: 0 auto; }
      .ql-list { display: flex; flex-direction: column; gap: 10px; }
      .ql-item { background: var(--surf); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; animation: up .4s ease both; }
      .ql-header {
        width: 100%; display: flex; align-items: center; justify-content: space-between;
        padding: 16px 18px; background: none; border: none;
        color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
        cursor: pointer; gap: 12px; text-align: left; transition: background .2s;
      }
      .ql-left  { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
      .ql-name  { font-size: 15px; font-weight: 700; }
      .ql-full  { font-size: 12px; color: var(--muted); }
      .ql-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
      .ql-origin { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 50px; }

      .ql-origin.global,   .ql-origin.academic  { background: rgba(96,165,250,.12); color: var(--blue); }
      .ql-origin.local,    .ql-origin.state      { background: rgba(0,229,160,.11);  color: var(--green); }
      .ql-origin.chartered { background: rgba(168,85,247,.11); color: #c084fc; }
      .ql-chevron { font-size: 18px; color: var(--muted); transition: transform .25s ease; line-height: 1; flex-shrink: 0; }

      .ql-body { max-height: 0; overflow: hidden; transition: max-height .38s ease-in-out; }
      .ql-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 18px 18px; }
      .ql-cell-label { font-size: 10px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }

            textEl.textContent = typewriterText;

        const el = document.getElementById(`acc-body-${key}`);
        if (el) {
          if (state.expandedKeys[key]) {
            el.style.maxHeight = el.scrollHeight + "px";
          } else {
            el.style.maxHeight = "0px";
          }
        }
        
        // Rotate chevron
        const chev = document.getElementById(`chev-${key}`);
        if (chev) {
          chev.style.transform = state.expandedKeys[key] ? "rotate(180deg)" : "rotate(0deg)";
        }
      }

      function submitLogin(e) {
        if (e) e.preventDefault();
        const usernameVal = document.getElementById("name-input").value.trim();
        const emailVal = document.getElementById("email-input").value.trim();
        if (!emailVal) return;

        const userObj = { name: usernameVal || "Student", email: emailVal };
        state.user = userObj;
        localStorage.setItem("cpf_user", JSON.stringify(userObj));
        state.viewHistory = ["dashboard"];
        render();
      }

      function handleLogout() {
        state.user = null;
        localStorage.removeItem("cpf_user");
        state.viewHistory = ["home"];
        render();
      }

      function getOriginClass(category) {
        const cat = category.toLowerCase();
        if (cat.includes("global") && cat.includes("chartered")) return "chartered";
        if (
          cat.includes("global") ||
          cat.includes("academic") ||
          cat.includes("university") ||
          cat.includes("uk") ||
          cat.includes("btec") ||
          cat.includes("affiliated")
        )
          return "global";
        if (cat.includes("local") && cat.includes("chartered")) return "chartered";
        return "local";
      }

              return `
                <div class="ql-item" style="animation-delay: ${idx * 0.05}s">
                  <button class="ql-header" onclick="toggleAccordionRow('${prefix}', ${idx})">
                    <div class="ql-left">
                      <span class="ql-name">${item.name}</span>
                      <span class="ql-full">${item.full || ''}</span>
                    </div>
                    <div class="ql-right">
                      <span class="ql-origin ${originClass}">${originLabel}</span>
                      <span id="chev-${key}" class="ql-chevron inline-block transition-transform duration-250" style="transform: ${isOpen ? 'rotate(180deg)' : 'rotate(0deg)'}">
                        ▾

                  <div id="acc-body-${key}" class="ql-body" style="max-height: ${isOpen ? '400px' : '0px'}">

        const ny = (e.clientY / window.innerHeight) * 2 - 1;
        
        const wl1 = document.getElementById('waveLayer1');
        const wl2 = document.getElementById('waveLayer2');
        const wl3 = document.getElementById('waveLayer3');
        const wl4 = document.getElementById('waveLayer4');
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');

        if (orb2) orb2.style.transform = `translate3d(${nx * 30}px, ${ny * -25}px, 0)`;
